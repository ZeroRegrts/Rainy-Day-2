<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雨天 — Learn</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="learn.css" />
</head>
<body>
  <script>
    if (sessionStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  </script>

  <div id="app">

    <div id="topnav" class="topnav-scaled">
      <a href="index.html" id="logo-mark">雨天</a>
      <div id="lang-toggle">
        <span id="toggle-en">EN</span>
        <span class="divider">|</span>
        <span id="toggle-zh">中文</span>
      </div>
    </div>

    <nav id="learn-tabs">
      <button class="tab-btn active" data-tab="drill">
        <span class="tab-zh">符號練習</span>
        <span class="tab-en">Symbol Drill</span>
      </button>
      <button class="tab-btn" data-tab="words">
        <span class="tab-zh">單字練習</span>
        <span class="tab-en">Word Practice</span>
      </button>
    </nav>

    <!-- SYMBOL DRILL -->
    <section id="tab-drill" class="tab-panel active">
      <div id="drill-header">
        <div id="drill-stats">
          <div class="drill-stat">
            <span class="drill-stat-label" id="lbl-streak">Streak</span>
            <span class="drill-stat-value" id="drill-streak">0</span>
          </div>
          <div class="drill-stat">
            <span class="drill-stat-label" id="lbl-accuracy">Accuracy</span>
            <span class="drill-stat-value" id="drill-accuracy">—</span>
          </div>
        </div>
        <div id="drill-group-nav">
          <span class="group-link active" data-filter="all" id="glink-all">All</span>
          <span class="group-link" data-filter="initials" id="glink-initials">Initials</span>
          <span class="group-link" data-filter="medials" id="glink-medials">Medials</span>
          <span class="group-link" data-filter="finals" id="glink-finals">Finals</span>
          <span class="group-link" data-filter="tones" id="glink-tones">Tones</span>
        </div>
      </div>

      <div id="drill-mastery-row"></div>

      <div id="drill-main">
        <div id="drill-card">
          <div id="drill-category-tag"></div>
          <div id="drill-symbol">ㄅ</div>
          <div id="drill-pinyin-hint">b</div>
          <div id="drill-expected-key"></div>
          <div id="drill-instruction">Press the key on your QWERTY keyboard</div>
          <div id="drill-feedback"></div>
        </div>
      </div>

      <div id="drill-toggles">
        <button class="toggle-btn active" id="btn-show-pinyin">Pinyin</button>
        <button class="toggle-btn active" id="btn-show-key">Show key</button>
        <button class="toggle-btn" id="btn-show-keyboard">Keyboard map</button>
      </div>

      <div id="drill-keyboard-hint" class="hint-hidden">
        <div id="drill-kb"></div>
      </div>
    </section>

    <!-- WORD PRACTICE -->
    <section id="tab-words" class="tab-panel">
      <div id="word-header">
        <div id="hsk-pills">
          <button class="hsk-pill active" data-hsk="1">HSK 1</button>
          <button class="hsk-pill" data-hsk="2">HSK 2</button>
          <button class="hsk-pill" data-hsk="3">HSK 3</button>
        </div>
        <div id="word-progress-wrap">
          <div id="word-progress-bar"><div id="word-progress-fill"></div></div>
          <span id="word-progress-label">0 / 0</span>
        </div>
        <div id="word-toggles">
          <button class="toggle-btn active" id="btn-show-zhuyin">Zhuyin</button>
          <button class="toggle-btn active" id="btn-show-keys">Key sequence</button>
        </div>
      </div>

      <div id="word-main">
        <div id="word-card">
          <div id="word-chars-row"></div>
          <div id="word-key-sequence"></div>
          <div id="word-meaning-label"></div>
          <div id="word-feedback"></div>
          <input id="word-input" type="text"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            placeholder="Type the word..." />
          <div id="word-hint-label">Enable your zhuyin input method</div>
        </div>
      </div>

      <div id="word-score-screen" class="hint-hidden">
        <div id="word-score-card">
          <div id="score-title">Session Complete</div>
          <div id="score-number"></div>
          <div id="score-pct"></div>
          <div id="score-buttons">
            <button id="btn-try-again">Try Again</button>
            <button id="btn-next-level">Next Level</button>
          </div>
        </div>
      </div>
    </section>

  </div>
  <script src="learn.js"></script>
</body>
</html>
