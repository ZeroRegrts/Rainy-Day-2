<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雨天 — Learn</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="learn.css" />
</head>
<body>
  <script>
    if (sessionStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  </script>

  <div id="app">

    <!-- ── TOP NAV ── -->
    <div id="topnav" class="topnav-scaled">
      <a href="index.html" id="logo-mark">雨天</a>
      <div id="lang-toggle">
        <span id="toggle-en">EN</span>
        <span class="divider">|</span>
        <span id="toggle-zh">中文</span>
      </div>
    </div>

    <!-- ── SECTION TABS ── -->
    <nav id="learn-tabs">
      <button class="tab-btn active" data-tab="word">
        <span class="tab-zh">單字</span>
        <span class="tab-en">Word</span>
      </button>
      <button class="tab-btn" data-tab="table">
        <span class="tab-zh">對照表</span>
        <span class="tab-en">Reference</span>
      </button>
      <button class="tab-btn" data-tab="keyboard">
        <span class="tab-zh">鍵盤</span>
        <span class="tab-en">Keyboard</span>
      </button>
    </nav>

    <!-- ══════════════════════════════════════
         TAB 1 — WORD EXPLORER
    ══════════════════════════════════════ -->
    <section id="tab-word" class="tab-panel active">

      <div id="word-card">

        <div id="word-notation-toggle">
          <button class="notation-btn active" data-mode="zhuyin">注音</button>
          <button class="notation-btn" data-mode="pinyin">拼音</button>
        </div>

        <div id="word-display-area">
          <div id="word-chars"></div>
          <div id="word-notation"></div>
          <div id="word-meaning"></div>
        </div>

        <div id="word-actions">
          <button id="btn-next-word">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            <span id="next-label">Next Word</span>
          </button>
        </div>

        <div id="word-counter"></div>
      </div>

      <!-- mini zhuyin key legend below card -->
      <div id="word-hint">
        <span id="word-hint-label">Each syllable shown above has a Zhuyin symbol — find it on the keyboard tab</span>
      </div>

    </section>

    <!-- ══════════════════════════════════════
         TAB 2 — ZHUYIN ↔ QWERTY TABLE
    ══════════════════════════════════════ -->
    <section id="tab-table" class="tab-panel">

      <div id="table-header">
        <h2 id="table-title">注音 / QWERTY Reference</h2>
        <p id="table-subtitle">Every Zhuyin symbol and its keyboard key</p>
      </div>

      <div id="zhuyin-table-wrap">

        <div class="zy-group">
          <div class="zy-group-label" id="label-initials">Initials 聲母</div>
          <div class="zy-grid" id="grid-initials"></div>
        </div>

        <div class="zy-group">
          <div class="zy-group-label" id="label-medials">Medials 介母</div>
          <div class="zy-grid" id="grid-medials"></div>
        </div>

        <div class="zy-group">
          <div class="zy-group-label" id="label-finals">Finals 韻母</div>
          <div class="zy-grid" id="grid-finals"></div>
        </div>

        <div class="zy-group">
          <div class="zy-group-label" id="label-tones">Tones 聲調</div>
          <div class="zy-grid" id="grid-tones"></div>
        </div>

      </div>
    </section>

    <!-- ══════════════════════════════════════
         TAB 3 — KEYBOARD OVERLAY
    ══════════════════════════════════════ -->
    <section id="tab-keyboard" class="tab-panel">

      <div id="keyboard-header">
        <h2 id="kb-title">Zhuyin Keyboard Layout</h2>
        <p id="kb-subtitle">Standard Zhuyin input — as seen on a Taiwanese keyboard</p>
      </div>

      <div id="keyboard-wrap">
        <div id="keyboard"></div>
      </div>

      <div id="kb-legend">
        <span class="kb-legend-item"><span class="kb-dot kb-dot-zh"></span><span id="legend-zh">Zhuyin</span></span>
        <span class="kb-legend-item"><span class="kb-dot kb-dot-qwerty"></span><span id="legend-qwerty">QWERTY</span></span>
        <span class="kb-legend-item"><span class="kb-dot kb-dot-tone"></span><span id="legend-tone">Tone key</span></span>
      </div>

    </section>

  </div><!-- /#app -->

  <script src="learn.js"></script>
</body>
</html>
